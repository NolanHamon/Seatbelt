name: Build Obfseat
on: [workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Seatbelt
      uses: actions/checkout@v4
      with:
        repository: GhostPack/Seatbelt
        path: Seatbelt
    - name: Checkout InvisibilityCloak
      uses: actions/checkout@v4
      with:
        repository: h4wkst3r/InvisibilityCloak
        path: InvisibilityCloak
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Obfuscate Seatbelt
      run: python InvisibilityCloak/InvisibilityCloak.py -d Seatbelt -n "Obfseat" -m base64
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    - name: Setup NuGet
      uses: nuget/setup-nuget@v2
    - name: Build Obfseat
      run: |
        nuget restore Obfseat/Obfseat.sln
        msbuild Obfseat/Obfseat.sln /p:Configuration=Release
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Obfseat-exe
        path: Obfseat/**/Release/Obfseat.exe
