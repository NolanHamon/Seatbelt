name: Build Obfseat
on: [workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Seatbelt
      uses: actions/checkout@v4
      with:
        repository: GhostPack/Seatbelt
        path: Seatbelt
    - name: Checkout InvisibilityCloak
      uses: actions/checkout@v4
      with:
        repository: h4wkst3r/InvisibilityCloak
        path: InvisibilityCloak
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Obfuscate Seatbelt
      run: python InvisibilityCloak/InvisibilityCloak.py -d Seatbelt -n "Obfseat" -m base64
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    - name: Setup NuGet
      uses: nuget/setup-nuget@v2
    - name: Build Obfseat
      run: |
        cd Obfseat
        # Trouve le fichier .sln quel que soit son nom et le compile
        $sln = Get-ChildItem -Filter *.sln | Select-Object -First 1
        Write-Host "Fichier solution trouvé : $($sln.Name)"
        nuget restore $sln.Name
        msbuild $sln.Name /p:Configuration=Release

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Obfseat-exe
        # On récupère tous les .exe dans les dossiers Release pour être sûr de l'avoir
        path: Obfseat/**/Release/*.exe
